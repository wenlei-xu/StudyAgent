version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent_learning_db
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent123
      POSTGRES_DB: agent_learning
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_learning"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
